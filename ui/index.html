<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WOW 自动钓鱼</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <div class="bg-shape one"></div>
    <div class="bg-shape two"></div>
    <div class="app">
      <header class="hero">
        <div class="hero-text">
          <p class="kicker">钓鱼自动化控制台</p>
          <h1>WOW 自动钓鱼</h1>
          <p class="subtitle">声音 + 视觉 自动钓鱼助手</p>
        </div>
        <div class="status" id="status">
          <span class="dot" id="status-dot"></span>
          <span class="label" id="status-label">空闲</span>
        </div>
      </header>

      <div class="content">
        <aside class="panel controls">
          <h2>运行设置</h2>
          <label class="field">
            <span>配置文件路径</span>
            <input id="config-path" type="text" value="config.json" />
          </label>
          <label class="field">
            <span>Python 路径</span>
            <input id="python-cmd" type="text" value="python" />
          </label>
          <label class="checkbox">
            <input id="run-once" type="checkbox" />
            <span>只钓一次</span>
          </label>
          <div class="button-row">
            <button id="load-btn">加载</button>
            <button id="save-btn">保存</button>
            <button id="start-btn" class="primary">开始</button>
            <button id="stop-btn">停止</button>
          </div>
          <div class="button-row">
            <button id="devices-btn" class="ghost">列出音频设备</button>
            <button id="clear-logs" class="ghost">清空日志</button>
          </div>
          <div class="section-label">录音工具</div>
          <label class="field">
            <span>录制时长（秒）</span>
            <input id="record-seconds" type="number" step="0.5" value="8" />
          </label>
          <label class="field">
            <span>保存路径</span>
            <input id="record-output" type="text" value="recordings/hook.wav" />
          </label>
          <div class="button-row single">
            <button id="record-btn" class="primary">开始录音</button>
          </div>
          <div class="section-label">鱼漂截图</div>
          <label class="field">
            <span>模板图片路径</span>
            <input
              id="capture-output"
              type="text"
              value="assets/bobber_template.png"
            />
          </label>
          <label class="field">
            <span>截图大小（像素）</span>
            <input id="capture-size" type="number" step="1" value="72" />
          </label>
          <label class="field">
            <span>等待时间（秒）</span>
            <input id="capture-timeout" type="number" step="0.5" value="10" />
          </label>
          <div class="button-row single">
            <button id="capture-btn">截取鱼漂</button>
          </div>
          <div class="section-label">额外模板（不同角度）</div>
          <div id="extra-templates-list" class="list-editor"></div>
          <div class="button-row single">
            <button id="add-extra-template-btn" class="ghost">+ 添加模板</button>
          </div>
          <div class="section-label">黑名单模板</div>
          <div id="blacklist-templates-list" class="list-editor"></div>
          <label class="field">
            <span>黑名单截图保存路径</span>
            <input id="blacklist-output" type="text" value="assets/blacklist_cursor.png" />
          </label>
          <label class="field">
            <span>黑名单截图大小（像素）</span>
            <input id="blacklist-size" type="number" step="1" value="48" />
          </label>
          <div class="button-row">
            <button id="capture-blacklist-btn" class="ghost">截取黑名单图标</button>
            <button id="add-blacklist-template-btn" class="ghost">+ 添加路径</button>
          </div>
          <p class="hint">使用虚拟环境的 Python，如 .\.venv\Scripts\python.exe</p>
        </aside>

        <main class="panel config">
          <h2>参数配置</h2>
          <form id="config-form">
            <section class="group">
              <div class="group-title">基本设置</div>
              <div class="grid">
                <label class="field">
                  <span>抛竿按键</span>
                  <input type="text" data-path="cast_key" />
                </label>
                <label class="field">
                  <span>抛竿后等待（秒）</span>
                  <input type="number" step="0.1" data-type="float" data-path="cast_delay_sec" />
                </label>
                <label class="field">
                  <span>拾取等待（秒）</span>
                  <input type="number" step="0.1" data-type="float" data-path="loot_delay_sec" />
                </label>
                <label class="field">
                  <span>音频设备编号</span>
                  <input type="number" step="1" data-type="int" data-nullable="true" data-path="audio.device" />
                </label>
                <label class="field">
                  <span>咬钩灵敏度</span>
                  <input type="number" step="0.01" data-type="float" data-path="audio.ratio_threshold" />
                </label>
                <label class="field">
                  <span>匹配灵敏度</span>
                  <input type="number" step="0.01" data-type="float" data-path="vision.match_threshold" />
                </label>
                <label class="checkbox inline">
                  <input type="checkbox" data-path="audio.wasapi_loopback" />
                  <span>WASAPI 回环录音</span>
                </label>
              </div>
            </section>

            <section class="group">
              <div class="group-title">搜索区域</div>
              <div class="grid">
                <label class="field">
                  <span>左</span>
                  <input id="region-left" type="number" step="1" data-type="int" data-path="vision.search_region.left" />
                </label>
                <label class="field">
                  <span>上</span>
                  <input id="region-top" type="number" step="1" data-type="int" data-path="vision.search_region.top" />
                </label>
                <label class="field">
                  <span>宽</span>
                  <input id="region-width" type="number" step="1" data-type="int" data-path="vision.search_region.width" />
                </label>
                <label class="field">
                  <span>高</span>
                  <input id="region-height" type="number" step="1" data-type="int" data-path="vision.search_region.height" />
                </label>
              </div>
              <div class="button-row single">
                <button id="pick-region-btn">框选搜索区域</button>
              </div>
            </section>

            <section class="group">
              <div class="group-title">识别增强</div>
              <div class="grid">
                <label class="field">
                  <span>鱼漂模板图片</span>
                  <input type="text" data-path="vision.template_path" />
                </label>
                <label class="field">
                  <span>黑名单匹配灵敏度</span>
                  <input type="number" step="0.01" data-type="float" data-path="vision.blacklist_threshold" />
                </label>
                <label class="checkbox inline">
                  <input type="checkbox" data-path="vision.use_edge_detection" />
                  <span>边缘检测</span>
                </label>
                <label class="checkbox inline">
                  <input type="checkbox" data-path="vision.use_orb" />
                  <span>特征点匹配</span>
                </label>
                <label class="checkbox inline">
                  <input type="checkbox" data-path="vision.glow_check" />
                  <span>光圈验证（区分自己的鱼漂）</span>
                </label>
              </div>
            </section>

            <details class="group advanced">
              <summary class="group-title">高级参数 ▸</summary>
              <div class="grid">
                <label class="field">
                  <span>采样率</span>
                  <input type="number" step="1" data-type="int" data-path="audio.sample_rate" />
                </label>
                <label class="field">
                  <span>FFT 大小</span>
                  <input type="number" step="1" data-type="int" data-path="audio.fft_size" />
                </label>
                <label class="field">
                  <span>目标频率（Hz）</span>
                  <input type="number" step="1" data-type="float" data-path="audio.freq_target_hz" />
                </label>
                <label class="field">
                  <span>频率带宽（Hz）</span>
                  <input type="number" step="1" data-type="float" data-path="audio.freq_band_hz" />
                </label>
                <label class="field">
                  <span>连续触发次数</span>
                  <input type="number" step="1" data-type="int" data-path="audio.consecutive_hits" />
                </label>
                <label class="field">
                  <span>突发检测倍数</span>
                  <input type="number" step="0.1" data-type="float" data-path="audio.spike_factor" />
                </label>
                <label class="field">
                  <span>突发检测窗口</span>
                  <input type="number" step="1" data-type="int" data-path="audio.spike_window" />
                </label>
                <label class="field">
                  <span>特征点最少匹配数</span>
                  <input type="number" step="1" data-type="int" data-path="vision.orb_min_matches" />
                </label>
                <label class="field">
                  <span>光圈亮度</span>
                  <input type="number" step="1" data-type="int" data-path="vision.glow_brightness_threshold" />
                </label>
                <label class="field">
                  <span>光圈检测灵敏度</span>
                  <input type="number" step="0.01" data-type="float" data-path="vision.glow_ratio_threshold" />
                </label>
                <label class="field">
                  <span>移动鼠标延迟（秒）</span>
                  <input type="number" step="0.01" data-type="float" data-path="click.move_delay_sec" />
                </label>
                <label class="field">
                  <span>点击后等待（秒）</span>
                  <input type="number" step="0.01" data-type="float" data-path="click.post_click_delay_sec" />
                </label>
                <label class="field">
                  <span>空闲等待（秒）</span>
                  <input type="number" step="0.01" data-type="float" data-path="loop.idle_sleep_sec" />
                </label>
                <label class="field">
                  <span>最长等待（秒）</span>
                  <input type="number" step="1" data-type="float" data-path="loop.max_wait_sec" />
                </label>
                <label class="field">
                  <span>最短监听（秒）</span>
                  <input type="number" step="0.5" data-type="float" data-path="loop.min_listen_sec" />
                </label>
              </div>
            </details>
          </form>
        </main>

        <section class="panel logs">
          <div class="logs-header">
            <h2>日志</h2>
            <div class="log-meta" id="log-meta">0 行</div>
          </div>
          <pre id="log-output"></pre>
        </section>
      </div>
    </div>
  </body>
</html>
